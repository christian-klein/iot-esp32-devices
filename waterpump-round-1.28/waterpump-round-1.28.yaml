esphome:
  name: waterpump-round-1-28
  friendly_name: Waterpump Round 1.28
  on_boot:
    priority: -10
    then:
      - light.turn_on: 
          id: backlight
          brightness: 100%

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  # Provide time to the device from HA
  reboot_timeout: 0s

time:
  - platform: homeassistant
    id: homeassistant_time


ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Configure your WIFI settings here or use secrets
  ap:
    ssid: "Waterpump-Fallback-AP"

captive_portal:

globals:
  - id: debug_logging
    type: bool
    initial_value: 'true'
  - id: pump_start_time
    type: uint32_t
    initial_value: '0'

binary_sensor:
  - platform: homeassistant
    id: pump_state
    entity_id: switch.waterpump_plug
    on_press:
      then:
        - lambda: 'id(pump_start_time) = millis();'
        - component.update: my_display
    on_release:
      then:
        - lambda: 'id(pump_start_time) = 0;'
        - component.update: my_display


color:
  - id: my_black
    red: 0%
    green: 0%
    blue: 0%
  - id: my_white
    red: 100%
    green: 100%
    blue: 100%
  - id: my_blue
    red: 20%
    green: 60%
    blue: 100%
  - id: my_green
    red: 0%
    green: 100%
    blue: 0%
  - id: my_red
    red: 100%
    green: 0%
    blue: 0%
  - id: my_gray
    red: 0.2
    green: 0.2
    blue: 0.2
  - id: my_matte_green
    red: 0.2
    green: 0.6
    blue: 0.2
  - id: my_matte_red
    red: 0.6
    green: 0.2
    blue: 0.2

font:
  - file: "gfonts://Jost"
    id: my_font
    size: 24

spi:
  clk_pin: GPIO14  # Definitive for GC9A01 v1.1
  mosi_pin: GPIO13

i2c:
  sda: GPIO38
  scl: GPIO39
  scan: true
  id: bus_a

display:
  - platform: ili9xxx
    model: GC9A01A
    id: my_display
    cs_pin: GPIO15
    dc_pin: GPIO21
    reset_pin: GPIO11
    rotation: 0
    data_rate: 40MHz
    invert_colors: true
    color_order: BGR
    lambda: |-
      it.fill(id(my_black));
      
      int cx = it.get_width() / 2;
      int cy = it.get_height() / 2;

      // Draw Progress Ring (2/3 arc, bottom gap)
      int r_ring = 115;
      float start_angle = 150.0f;
      float end_angle = 390.0f;
      float total_arc = end_angle - start_angle;
      float total_arc_inv = 1.0f / total_arc;
      float deg_to_rad = M_PI / 180.0f;
      
      // Draw background ring (thin gray outline)
      for (float a = start_angle; a <= end_angle; a += 2.0f) {
        float rad1 = a * deg_to_rad;
        float rad2 = (a + 2.0f) * deg_to_rad;
        it.line(cx + r_ring * cos(rad1), cy + r_ring * sin(rad1), 
                cx + r_ring * cos(rad2), cy + r_ring * sin(rad2), id(my_gray));
      }

      if (id(pump_state).state) {
        uint32_t elapsed = (millis() - id(pump_start_time)) / 1000;
        float progress = std::min((float)elapsed / 1200.0f, 1.0f); // 20 mins = 1200s
        
        // Shrink counter-clockwise: the right end (end_angle) moves towards the left (start_angle)
        float current_end = end_angle - (progress * total_arc);

        // Draw progress ring segments
        float last_x = -1, last_y = -1;
        float last_thickness = -1;

        for (float a = start_angle; a <= current_end; a += 1.0f) { // Finer step for smoothness
          float p_spatial = (a - start_angle) * total_arc_inv;
          
          // Color interpolation: Matte Green (p=1) to Matte Red (p=0)
          int r_val = (int)(255.0f * (0.6f * (1.0f - p_spatial) + 0.2f * p_spatial));
          int g_val = (int)(255.0f * (0.2f * (1.0f - p_spatial) + 0.6f * p_spatial));
          int b_val = (int)(255.0f * 0.2f);
          Color progress_color = Color(r_val, g_val, b_val);

          float thickness = 4.0f + (p_spatial * 12.0f); 
          float rad = a * deg_to_rad;
          float x = cx + r_ring * cos(rad);
          float y = cy + r_ring * sin(rad);

          if (last_x != -1) {
            // Draw a line to bridge the gap and avoid "dots"
            it.line(last_x, last_y, x, y, progress_color);
            // Optionally draw triangles or multiple lines for true thickness, 
            // but for 1 degree steps, filled circles are better if we overlap enough.
          }
          it.filled_circle(x, y, (int)thickness, progress_color);
          
          last_x = x; last_y = y;
        }
      }

      // Center Button (On/Off)
      int r_button = 60;
      bool is_on = id(pump_state).state;
      Color button_color = is_on ? id(my_matte_green) : id(my_matte_red);
      
      // Button outline (matching timer outline)
      it.circle(cx, cy, r_button + 1, id(my_gray));
      it.circle(cx, cy, r_button + 2, id(my_gray)); // 2px thick for better visibility

      it.filled_circle(cx, cy, r_button, button_color);

      // Label on the button
      it.print(cx, cy, id(my_font), id(my_white), TextAlign::CENTER, is_on ? "ON" : "OFF");

      // Label on the button
      it.print(cx, cy, id(my_font), id(my_white), TextAlign::CENTER, is_on ? "ON" : "OFF");

      // Text "Waterpump" below the button
      it.print(cx, cy + 85, id(my_font), id(my_white), TextAlign::CENTER, "Waterpump");

      // Time above the button
      auto time_now = id(homeassistant_time).now();
      if (time_now.is_valid()) {
        it.strftime(cx, cy - 85, id(my_font), id(my_white), TextAlign::CENTER, "%H:%M", time_now);
      }

touchscreen:
  - platform: cst816
    id: my_touch
    display: my_display
    interrupt_pin: GPIO40  # Definitive for GC9A01 v1.1
    reset_pin: GPIO16
    on_touch:
      - homeassistant.service:
          service: switch.toggle
          data:
            entity_id: switch.waterpump_plug
      - lambda: |-
          if (id(debug_logging)) {
            ESP_LOGI("touch", "Touch at x=%d, y=%d", touch.x, touch.y);
          }

# Backlight control
output:
  - platform: ledc
    pin: GPIO45
    id: backlight_pwm
    frequency: 5000Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: ALWAYS_ON

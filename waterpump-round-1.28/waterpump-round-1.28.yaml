esphome:
  name: waterpump-round-1-28
  friendly_name: Waterpump Round 1.28
  on_boot:
    priority: -10
    then:
      - light.turn_on: 
          id: backlight
          brightness: 100%

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Configure your WIFI settings here or use secrets
  ap:
    ssid: "Waterpump-Fallback-AP"

captive_portal:

globals:
  - id: propeller_angle
    type: float
    initial_value: '0.0'
  - id: debug_logging
    type: bool
    initial_value: 'true'

binary_sensor:
  - platform: homeassistant
    id: pump_state
    entity_id: switch.waterpump_plug
    on_press:
      then:
        - script.execute: spin_propeller
    on_release:
      then:
        - script.stop: spin_propeller

script:
  - id: spin_propeller
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return true;'
          then:
            - lambda: |-
                id(propeller_angle) += 10.0;
                if (id(propeller_angle) >= 360.0) id(propeller_angle) -= 360.0;
            - delay: 50ms
            - component.update: my_display

color:
  - id: my_black
    red: 0%
    green: 0%
    blue: 0%
  - id: my_white
    red: 100%
    green: 100%
    blue: 100%
  - id: my_blue
    red: 20%
    green: 60%
    blue: 100%

font:
  - file: "gfonts://Roboto"
    id: roboto_font
    size: 24

spi:
  clk_pin: GPIO14  # Definitive for GC9A01 v1.1
  mosi_pin: GPIO13

i2c:
  sda: GPIO38
  scl: GPIO39
  scan: true
  id: bus_a

display:
  - platform: ili9xxx
    model: GC9A01A
    id: my_display
    cs_pin: GPIO15
    dc_pin: GPIO21
    reset_pin: GPIO11
    rotation: 0
    data_rate: 40MHz
    invert_colors: true
    color_order: BGR
    lambda: |-
      it.fill(id(my_black));
      
      int cx = it.get_width() / 2;
      int cy = it.get_height() / 2;
      int r = 60;
      float angle_rad = id(propeller_angle) * M_PI / 180.0;

      // Draw 3 propeller blades
      for (int i = 0; i < 3; i++) {
        float a = angle_rad + i * 2.0 * M_PI / 3.0;
        int x = cx + r * cos(a);
        int y = cy + r * sin(a);
        it.line(cx, cy, x, y, id(my_blue));
        // Draw a small circle at the end of each blade for thickness
        it.filled_circle(x, y, 5, id(my_blue));
      }
      
      // Center hub
      it.filled_circle(cx, cy, 8, id(my_white));
      
      // Text "Waterpump" below the propeller
      it.print(cx, cy + 85, id(roboto_font), id(my_white), TextAlign::CENTER, "Waterpump");

touchscreen:
  - platform: cst816
    id: my_touch
    display: my_display
    interrupt_pin: GPIO40  # Definitive for GC9A01 v1.1
    reset_pin: GPIO16
    on_touch:
      - homeassistant.service:
          service: switch.toggle
          data:
            entity_id: switch.waterpump_plug
      - lambda: |-
          if (id(debug_logging)) {
            ESP_LOGI("touch", "Touch at x=%d, y=%d", touch.x, touch.y);
          }

# Backlight control
output:
  - platform: ledc
    pin: GPIO45
    id: backlight_pwm
    frequency: 5000Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: ALWAYS_ON
